---
name: lint
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call: # so composite actions can use this
permissions:
  pull-requests: write
  checks: write
  contents: read
jobs:
  lint:
    uses: sheldonhull/github-workflows/.github/workflows/trunk.yml@a66ffe3695e73068f50e8e2bd16d7fef48fb6876 # main
    secrets: inherit
